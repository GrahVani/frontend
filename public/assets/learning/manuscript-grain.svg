<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="presentation" aria-hidden="true">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.35
                              0 0 0 0 0.28
                              0 0 0 0 0.18
                              0 0 0 0.06 0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>
